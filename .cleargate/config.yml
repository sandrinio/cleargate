# ClearGate per-repo configuration.
# See cleargate-planning/.cleargate/config.example.yml for the full schema.

wiki:
  index_token_ceiling: 8000
  # CR-002: raised from default 50 to accommodate the full story corpus (136 stories).
  bucket_pagination_ceiling: 200

gates:
  # Worker cap lives in cleargate-cli/vitest.config.ts (poolOptions.forks.maxForks=2).
  # Override via VITEST_MAX_FORKS env (e.g. VITEST_MAX_FORKS=8 on CI). See
  # FLASHCARD `#vitest #leak #ram` for context.
  precommit: "npm run typecheck --workspace=cleargate-cli && npm test --workspace=cleargate-cli"
  test: "npm test --workspace=cleargate-cli"
  typecheck: "npm run typecheck --workspace=cleargate-cli"
  lint: "npx cleargate wiki lint"
