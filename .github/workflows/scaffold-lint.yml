name: scaffold-lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  scaffold-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci --workspace=cleargate-cli

      - name: Build CLI
        run: npm run build --workspace=cleargate-cli

      - name: Run scaffold-lint
        run: node cleargate-cli/dist/cli.cjs scaffold-lint

  foreign-repo-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci --workspace=cleargate-cli

      - name: Build CLI
        run: npm run build --workspace=cleargate-cli

      - name: Run foreign-repo integration test
        # foreign-repo.test.ts uses vitest (describe/it/expect from 'vitest');
        # the default `npm test` runs node:test via tsx, which trips
        # "Vitest failed to access its internal state" on this file. Use
        # vitest directly for this integration suite.
        run: cd cleargate-cli && npx vitest run test/integration/foreign-repo.test.ts
